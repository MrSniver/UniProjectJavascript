<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasyno online</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <header>
        <div class="hamburger-menu">
            <img src="Placeholdery/hamburgermenu.png" alt="Menu" onclick="toggleMobileMenu()">
        </div>
        
        <div id="logged-in-section" style="display: none;">
            <span>Aktualna waluta</span>
            <span id="user-currency">0</span>
            <a href="sklep.html"><button>+</button></a>
        </div>
        
        <div id="logged-in-user-panel" style="display: none;">
            <a href="UserPanel/panel.html"><button>Panel użytkownika</button></a>
            <button onclick="logout()">Wyloguj się</button>
            <img src="Placeholdery/placeholder.jpg" alt="User Avatar" class="user-avatar">
        </div>
        
        <div id="not-logged-in-section" style="display: none; margin-left: auto;">
            <a href="Logowanie/login.html"><button>Zaloguj się</button></a>
            <a href="Rejestracja/register.html"><button>Zarejestruj się</button></a>
        </div>
    </header>

    <div>
        <nav>
            <a href="index.html"><button class="active-nav">Strona główna</button></a>
            <a href="Gry/blackjack.html"><button>Blackjack</button></a>
            <a href="Gry/ruletka.html"><button>Ruletka</button></a>
            <a href="Gry/sloty.html"><button>Sloty</button></a>
            <a href="sklep.html"><button>Sklep</button></a>
            <a href="PanelAdmin/paneladminauzytkownicy.html"><button>Panel admina</button></a>
        </nav>

        <main>
            <section class="homepage-container">
                <!-- Nagłówek główny -->
                <h1 class="hero-title">Witaj w kasynie! Pora zacząć zarabiać</h1>

                <!-- Sekcja Blackjack -->
                <a href="Gry/blackjack.html" style="text-decoration: none;">
                    <div class="slots-box" style="border: 5px solid black;">
                        <img src="Placeholdery/blackjack.png" alt="Blackjack" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                </a>

                <!-- Sekcja Reklama -->
                <div class="reklama-box">
                    <img src="Placeholdery/ad.png" alt="reklama1" style="width: 100%; height: 100%; object-fit: cover;">
                </div>

                <a href="Gry/ruletka.html" style="text-decoration: none;">
                    <div class="slots-box" style="border: 5px solid black;">
                        <img src="Placeholdery/ruletka.png" alt="Ruletka" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                </a>

                <div class="reklama2-box">
                    <img src="Placeholdery/ad.png" alt="reklama2" style="width: 100%; height: 100%; object-fit: cover;">
                </div>

                <a href="Gry/sloty.html" style="text-decoration: none;">
                    <div class="slots-box" style="border: 5px solid black;">
                        <img src="Placeholdery/slotyyy.png" alt="Sloty" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                </a>

                <!-- Footer -->
                <footer>
                    <h3>Kontakt</h3>
                    <p>Email adres: szczuryhazardowe@gmail.com</p>
                    <p>Nr tel. 600 100 100</p>
                    <p>Adres: Czarnowiejska 36, 30-054 Kraków, Polska</p>
                </footer>
            </section>
        </main>
    </div>

    <script>
        // Sprawdź status logowania przy załadowaniu strony
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
            checkAdminStatus();
        });
    </script>
</body>
</html>
