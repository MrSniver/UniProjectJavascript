<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Płatność - Kasyno</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
        .payment-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
            padding: 20px;
        }
        
        .payment-card {
            background: #400B45;
            border-radius: 12px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid #510D57;
        }
        
        .payment-card h2 {
            text-align: center;
            color: var(--text-color, #fff);
            margin-bottom: 25px;
            font-size: 1.5rem;
        }
        
        .order-summary {
            background: #510D57;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #510D57;
        }
        
        .order-summary p {
            margin: 8px 0;
            color: var(--text-color, #fff);
        }
        
        .price-highlight {
            color: var(--accent-color, #ffd700);
            font-weight: bold;
            font-size: 1.1rem;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            color: var(--text-color, #fff);
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #510D57;
            border-radius: 6px;
            background: #510D57;
            color: var(--text-color, #fff);
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--accent-color, #ffd700);
            box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.2);
        }
        
        .flex-row {
            display: flex;
            gap: 15px;
        }
        
        .flex-row .input-group {
            flex: 1;
        }
        
        .payment-methods {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
            padding: 15px;
            background: #510D57;
            border-radius: 8px;
            border: 1px solid #510D57;
        }
        
        .payment-methods img {
            height: 24px;
            width: auto;
            filter: brightness(0.9);
            opacity: 0.8;
        }
        
        .submit-payment {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 0 auto 15px auto;
            padding: 15px 30px;
            background: var(--accent-color, #ffd700);
            color: var(--bg-primary, #000);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .submit-payment:hover {
            background: var(--accent-hover, #ffed4e);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
        }
        
        .cancel-link {
            display: block;
            text-align: center;
            color: var(--text-secondary, #aaa);
            text-decoration: none;
            padding: 12px;
            border: 1px solid #510D57;
            border-radius: 8px;
            background: transparent;
            transition: all 0.3s ease;
            max-width: 300px;
            margin: 0 auto;
            box-sizing: border-box;
        }
        
        .cancel-link:hover {
            background: #510D57;
            color: var(--text-color, #fff);
            border-color: var(--accent-color, #ffd700);
        }
        
        .method-btn {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #510D57;
            background: #400B45;
            color: var(--text-color, #fff);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            min-height: 45px;
        }
        
        .method-selection-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        @media (max-width: 480px) {
            .method-selection-container {
                flex-direction: column;
                gap: 10px;
            }
            
            .method-btn {
                font-size: 12px;
                padding: 10px 15px;
            }
        }
        
        .method-btn.active {
            border-color: var(--accent-color, #ffd700);
            background: var(--accent-color, #ffd700);
            color: var(--bg-primary, #000);
        }
        
        .method-btn:hover {
            border-color: var(--accent-color, #ffd700);
        }
        
        .saved-card-option {
            background: #510D57;
            border: 1px solid #666;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .saved-card-option:hover, .saved-card-option.selected {
            border-color: var(--accent-color, #ffd700);
            background: rgba(255, 215, 0, 0.1);
        }
        
        .saved-card-info {
            color: var(--text-color, #fff);
        }
        
        .saved-card-info .card-number {
            font-weight: bold;
            font-size: 16px;
        }
        
        .saved-card-info .card-details {
            font-size: 14px;
            color: #aaa;
            margin-top: 4px;
        }
        
        .card-radio {
            margin-left: 10px;
        }

        @media (max-width: 500px) {
            .payment-card {
                padding: 20px;
                margin: 10px;
            }
            
            .flex-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="hamburger-menu">
            <img src="../Placeholdery/hamburgermenu.png" alt="Menu" onclick="toggleMobileMenu()">
        </div>
        
        <div id="logged-in-section" style="display: none;">
            <span>Aktualna waluta</span>
            <span id="user-currency">0</span>
            <a href="../sklep.html"><button>+</button></a>
        </div>
        
        <div id="logged-in-user-panel" style="display: none;">
            <a href="panel.html"><button>Panel użytkownika</button></a>
            <button onclick="logout()">Wyloguj się</button>
            <img src="../Placeholdery/placeholder.jpg" alt="User Avatar" class="user-avatar">
        </div>
        
        <div id="not-logged-in-section" style="display: none; margin-left: auto;">
            <a href="../Logowanie/login.html"><button>Zaloguj się</button></a>
            <a href="../Rejestracja/register.html"><button>Zarejestruj się</button></a>
        </div>
    </header>
    
    <div>
      <nav>
        <a href="../index.html"><button>Strona główna</button></a>
        <a href="../Gry/blackjack.html"><button>Blackjack</button></a>
        <a href="../Gry/ruletka.html"><button>Ruletka</button></a>
        <a href="../Gry/sloty.html"><button>Sloty</button></a>
        <a href="../sklep.html"><button>Sklep</button></a>
        <a href="../PanelAdmin/paneladminauzytkownicy.html"><button>Panel admina</button></a>
      </nav>
        <main>
            <section class="payment-container">
                <div class="payment-card">
                    <h2>Finalizacja płatności</h2>
                    <div class="order-summary">
                        <p>Wybrany pakiet: <strong id="package-name">Ładowanie...</strong></p>
                        <p>Ilość żetonów: <strong id="package-tokens">Ładowanie...</strong></p>
                        <p>Do zapłaty: <span class="price-highlight" id="package-price">Ładowanie...</span></p>
                    </div>

                    <div class="payment-method-selection">
                        <h3 style="color: var(--text-color, #fff); margin-bottom: 20px; text-align: center;">Wybierz metodę płatności</h3>
                        
                        <div class="method-selection-container">
                            <button type="button" id="use-saved-card-btn" class="method-btn active" onclick="togglePaymentMethod('saved')">
                                Użyj zapisanej karty
                            </button>
                            <button type="button" id="use-new-card-btn" class="method-btn" onclick="togglePaymentMethod('new')">
                                Użyj nowej karty
                            </button>
                        </div>
                    </div>

                    <!-- Sekcja zapisanych kart -->
                    <div id="saved-cards-section" style="display: none;">
                        <div id="saved-cards-list">
                            <!-- Zapisane karty będą tutaj załadowane -->
                        </div>
                        <div id="no-saved-cards" style="display: none;">
                            <p style="text-align: center; color: #aaa; margin: 20px 0;">
                                Nie masz zapisanych kart płatniczych.
                                <br><a href="paymentmethods.html" style="color: var(--accent-color, #ffd700);">Dodaj kartę w ustawieniach</a>
                            </p>
                        </div>
                    </div>

                    <form id="payment-form">
                        <!-- Sekcja nowej karty -->
                        <div id="new-card-section">
                            <div class="input-group">
                                <label for="card_holder">Imię i nazwisko posiadacza</label>
                                <input type="text" id="card_holder" placeholder="Jan Kowalski" required>
                            </div>

                            <div class="input-group">
                                <label for="card_number">Numer karty</label>
                                <input type="text" id="card_number" placeholder="4000 0000 0000 0000" maxlength="19" required>
                            </div>

                            <div class="flex-row">
                                <div class="input-group">
                                    <label for="card_date">Data ważności</label>
                                    <input type="text" id="card_date" placeholder="MM/YY" maxlength="5" required>
                                </div>
                                <div class="input-group">
                                    <label for="ccv">Kod CVV</label>
                                    <input type="password" id="ccv" placeholder="123" maxlength="3" required>
                                </div>
                            </div>

                            <div class="input-group">
                                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                                    <input type="checkbox" id="save_card" style="width: auto;">
                                    <span>Zapisz kartę dla przyszłych płatności</span>
                                </label>
                            </div>
                        </div>

                        <div class="payment-methods">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">
                        </div>

                        <button type="submit" class="submit-payment">Zapłać i doładuj konto</button>
                        <a href="../sklep.html" class="cancel-link">Wróć do sklepu</a>
                        <a href="paymentmethods.html" class="cancel-link" style="margin-top: 10px;">Zarządzaj kartami</a>
                    </form>
                </div>
            </section>
        </main>
    </div>
    <script src="../script.js"></script>
    <script>
        // Sprawdź status logowania przy załadowaniu strony
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatusLocal();
            checkAdminStatusLocal();
            updateCurrency();
            
            // Inicjalizacja - domyślnie pokaż sekcję zapisanych kart
            togglePaymentMethod('saved');
        });
        
        // Lokalne funkcje sprawdzania stanu logowania
        function checkLoginStatusLocal() {
            const token = localStorage.getItem('token');
            const loggedInSection = document.getElementById('logged-in-section');
            const loggedInUserPanel = document.getElementById('logged-in-user-panel');
            const notLoggedInSection = document.getElementById('not-logged-in-section');
            
            if (token) {
                // Użytkownik jest zalogowany
                if (loggedInSection) loggedInSection.style.display = 'flex';
                if (loggedInUserPanel) loggedInUserPanel.style.display = 'flex';
                if (notLoggedInSection) notLoggedInSection.style.display = 'none';
            } else {
                // Użytkownik nie jest zalogowany - przekieruj na stronę logowania
                alert('Musisz być zalogowany aby dokonać płatności!');
                window.location.href = '../Logowanie/login.html';
            }
        }
        
        function checkAdminStatusLocal() {
            // Sprawdź czy użytkownik jest adminem i pokaż odpowiednie elementy
            const adminButtons = document.querySelectorAll('a[href*="PanelAdmin"]');
            const isAdmin = localStorage.getItem('isAdmin') === 'true';
            
            adminButtons.forEach(button => {
                if (isAdmin) {
                    button.style.display = 'inline-block';
                } else {
                    button.style.display = 'none';
                }
            });
        }
        
        async function updateCurrency() {
            try {
                const token = localStorage.getItem('token');
                if (!token) return;
                
                const response = await fetch('http://13.53.174.126:3000/api/users/getcurrency', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const result = await response.json();
                    console.log('Currency API response:', result);
                    const currencyElement = document.getElementById('user-currency');
                    
                    // Sprawdź różne możliwe struktury odpowiedzi
                    let currencyValue = result.currency || result.money || result.amount || result.balance;
                    
                    if (currencyElement && currencyValue !== undefined) {
                        currencyElement.textContent = currencyValue;
                        console.log('Currency updated to:', currencyValue);
                    } else {
                        console.log('Currency element or value not found:', {
                            element: currencyElement,
                            value: currencyValue,
                            fullResult: result
                        });
                    }
                } else {
                    console.error('Failed to fetch user currency, status:', response.status);
                }
            } catch (error) {
                console.error('Error updating currency:', error);
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('isAdmin');
            window.location.href = '../index.html';
        }
        
        // Wczytaj parametry z URL
        function loadPackageInfo() {
            const urlParams = new URLSearchParams(window.location.search);
            const packageTokens = urlParams.get('package') || '500';
            const packagePrice = urlParams.get('price') || '50';
            const packageName = urlParams.get('name') || 'Pakiet żetonów';
            
            document.getElementById('package-name').textContent = packageName;
            document.getElementById('package-tokens').textContent = packageTokens + ' żetonów';
            document.getElementById('package-price').textContent = packagePrice + ' PLN';
        }
        
        // Załaduj informacje przy starcie
        window.addEventListener('load', loadPackageInfo);
        
        // Formatowanie numeru karty
        document.getElementById('card_number').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
            let formattedValue = value.match(/.{1,4}/g)?.join(' ') || value;
            if (value.length <= 16) {
                e.target.value = formattedValue;
            }
        });
        
        // Formatowanie daty
        document.getElementById('card_date').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.substring(0,2) + '/' + value.substring(2,4);
            }
            e.target.value = value;
        });
        
        // Funkcje dla wyboru metody płatności
        let paymentMethods = [];
        let selectedPaymentMethod = null;
        let currentPaymentMethod = 'new';
        
        function togglePaymentMethod(method) {
            currentPaymentMethod = method;
            
            const savedSection = document.getElementById('saved-cards-section');
            const newCardSection = document.getElementById('new-card-section');
            const savedBtn = document.getElementById('use-saved-card-btn');
            const newCardBtn = document.getElementById('use-new-card-btn');
            
            if (method === 'saved') {
                savedSection.style.display = 'block';
                newCardSection.style.display = 'none';
                savedBtn.classList.add('active');
                newCardBtn.classList.remove('active');
                loadSavedCards();
                
                // Usuwanie atrybutu required z pól nowej karty
                const newCardInputs = newCardSection.querySelectorAll('input[required]');
                newCardInputs.forEach(input => {
                    input.removeAttribute('required');
                });
            } else {
                savedSection.style.display = 'none';
                newCardSection.style.display = 'block';
                savedBtn.classList.remove('active');
                newCardBtn.classList.add('active');
                selectedPaymentMethod = null;
                
                // Przywracanie atrybutu required dla pól nowej karty
                const requiredFields = ['card_holder', 'card_number', 'card_date', 'ccv'];
                requiredFields.forEach(fieldId => {
                    const field = document.getElementById(fieldId);
                    if (field) field.setAttribute('required', 'required');
                });
            }
        }
        
        async function loadSavedCards() {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    showNoCardsMessage();
                    return;
                }
                
                const response = await fetch('http://13.53.174.126:3000/api/payments/getpayments', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const result = await response.json();
                    paymentMethods = result.cards || [];
                    displaySavedCards();
                } else {
                    console.error('Failed to load payment methods');
                    paymentMethods = [];
                    showNoCardsMessage();
                }
            } catch (error) {
                console.error('Error loading saved cards:', error);
                paymentMethods = [];
                showNoCardsMessage();
            }
        }
        
        function displaySavedCards() {
            const container = document.getElementById('saved-cards-list');
            if (paymentMethods.length === 0) {
                showNoCardsMessage();
                return;
            }
            
            container.innerHTML = paymentMethods.map((method, index) => `
                <div class="saved-card-option" onclick="selectCard(${index})">
                    <div class="saved-card-info">
                        <div class="card-number">${method.type || 'Visa'} ${method.number}</div>
                        <div class="card-details">${method.holder} | ${method.expiry}</div>
                    </div>
                    <input type="radio" name="saved_card" value="${index}" class="card-radio" ${index === 0 ? 'checked' : ''}>
                </div>
            `).join('');
            
            // Select first card by default
            if (paymentMethods.length > 0) {
                selectedPaymentMethod = paymentMethods[0];
                selectCard(0);
            }
        }
        
        function showNoCardsMessage() {
            const container = document.getElementById('saved-cards-list');
            container.innerHTML = `
                <div style="text-align: center; padding: 20px; color: #aaa;">
                    <p>Brak zapisanych metod płatności</p>
                </div>
            `;
        }
        
        function selectCard(index) {
            selectedPaymentMethod = paymentMethods[index];
            
            // Update radio buttons
            document.querySelectorAll('input[name="saved_card"]').forEach((radio, idx) => {
                radio.checked = idx === index;
            });
            
            // Update visual selection
            document.querySelectorAll('.saved-card-option').forEach((option, idx) => {
                if (idx === index) {
                    option.classList.add('selected');
                } else {
                    option.classList.remove('selected');
                }
            });
        }
        
        // Obsługa formularza
        document.getElementById('payment-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.querySelector('.submit-payment');
            const originalText = submitBtn.textContent;
            
            submitBtn.textContent = 'Przetwarzanie...';
            submitBtn.disabled = true;
            
            try {
                if (currentPaymentMethod === 'saved') {
                    if (!selectedPaymentMethod) {
                        alert('Wybierz metodę płatności');
                        return;
                    }
                    await processPaymentWithSaved();
                } else {
                    const saveCard = document.getElementById('save_card').checked;
                    await processPaymentWithNew(saveCard);
                }
            } catch (error) {
                console.error('Form submission error:', error);
                alert('Wystąpił błąd podczas przetwarzania płatności');
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
        
        async function processPaymentWithSaved() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const packagePrice = parseFloat(urlParams.get('price')) || 50;
                const packageTokens = parseInt(urlParams.get('package')) || 500;
                
                const token = localStorage.getItem('jwt') || localStorage.getItem('token');
                if (!token) {
                    alert('Musisz być zalogowany!');
                    return;
                }
                
                // Wywołanie endpoint /pay
                const response = await fetch('http://13.53.174.126:3000/api/payments/pay', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        payedAmount: packagePrice,
                        currencyAmount: packageTokens
                    })
                });
                
                window.location.href = '../sklep.html';
                
            } catch (error) {
                console.error('Payment error:', error);
                alert('Błąd połączenia z serwerem');
            }
        }
        
        async function processPaymentWithNew(saveCard) {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const packagePrice = parseFloat(urlParams.get('price')) || 50;
                const packageTokens = parseInt(urlParams.get('package')) || 500;
                
                const token = localStorage.getItem('token');
                if (!token) {
                    alert('Musisz być zalogowany!');
                    return;
                }
                
                const cardData = {
                    holder: document.getElementById('card_holder').value,
                    fullNumber: document.getElementById('card_number').value.replace(/\s/g, ''),
                    expiry: document.getElementById('card_date').value,
                    cvv: document.getElementById('ccv').value
                };
                
                // Walidacja danych karty
                if (cardData.fullNumber.length !== 16) {
                    alert('Numer karty musi mieć 16 cyfr');
                    return;
                }
                
                if (cardData.expiry.length !== 5) {
                    alert('Data ważności musi być w formacie MM/YY');
                    return;
                }
                
                if (cardData.cvv.length !== 3) {
                    alert('Kod CVV musi mieć 3 cyfry');
                    return;
                }
                
                // Jeśli użytkownik chce zapisać kartę, najpierw ją dodaj
                if (saveCard) {
                    const addCardResponse = await fetch('http://13.53.174.126:3000/api/users/addpayment', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            number: cardData.fullNumber,
                            ccv: cardData.cvv,
                            cardDate: cardData.expiry,
                            cardHolder: cardData.holder
                        })
                    });
                    
                    if (!addCardResponse.ok) {
                        const addCardError = await addCardResponse.json();
                        alert('Błąd podczas zapisywania karty: ' + (addCardError.message || 'Nieznany błąd'));
                        // Kontynuuj płatność mimo błędu zapisywania
                    }
                }
                
                // Wywołanie endpoint /pay
                const response = await fetch('http://13.53.174.126:3000/api/payments/pay', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        payedAmount: packagePrice,
                        currencyAmount: packageTokens
                    })
                });
                
                // Przekieruj do sklepu niezależnie od odpowiedzi
                window.location.href = '../sklep.html';
                
            } catch (error) {
                console.error('Payment error:', error);
                alert('Błąd połączenia z serwerem');
            }
        }
    </script>
</body>
</html>
