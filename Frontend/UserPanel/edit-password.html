<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Zmień hasło</title>
    <link rel="stylesheet" href="../style.css" />
    <style>
      .password-form {
        display: flex;
        flex-direction: column;
        gap: 15px;
        max-width: 400px;
        margin: 20px 0;
        padding: 20px;
      }
      
      .password-form .dark-input {
        width: 100%;
        margin: 0;
      }
      
      .password-form button {
        align-self: flex-start;
        margin-top: 10px;
      }
      
      #password-status {
        text-align: left;
        margin: 10px 0;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="hamburger-menu">
        <img src="../Placeholdery/hamburgermenu.png" alt="Menu" onclick="toggleMobileMenu()" />
      </div>
        
        <div id="logged-in-section" style="display: none;">
            <span>Aktualna waluta</span>
            <span id="user-currency">0</span>
            <a href="../sklep.html"><button>+</button></a>
        </div>
        
        <div id="logged-in-user-panel" style="display: none;">
            <a href="panel.html"><button class="active-nav">Panel użytkownika</button></a>
            <button onclick="logout()">Wyloguj się</button>
            <img src="../Placeholdery/placeholder.jpg" alt="User Avatar" class="user-avatar" />
        </div>
        
        <div id="not-logged-in-section" style="display: none; margin-left: auto;">
            <a href="../Logowanie/login.html"><button>Zaloguj się</button></a>
            <a href="../Rejestracja/register.html"><button>Zarejestruj się</button></a>
        </div>
    </header>

    <div>
      <nav>
        <a href="../index.html"><button>Strona główna</button></a>
        <a href="../Gry/blackjack.html"><button>Blackjack</button></a>
        <a href="../Gry/ruletka.html"><button>Ruletka</button></a>
        <a href="../Gry/sloty.html"><button>Sloty</button></a>
        <a href="../sklep.html"><button>Sklep</button></a>
        <a href="../PanelAdmin/paneladminauzytkownicy.html"
          ><button>Panel admina</button></a
        >
      </nav>

      <main>
        <h1>Zmień hasło</h1>

        <div class="password-form">
          <input
            class="dark-input"
            type="password"
            id="current-password"
            placeholder="Aktualne hasło"
            required
          />
          <input
            class="dark-input"
            type="password"
            id="new-password"
            placeholder="Nowe hasło"
            required
          />
          <input
            class="dark-input"
            type="password"
            id="confirm-password"
            placeholder="Potwierdź nowe hasło"
            required
          />
          <button class="button-small" onclick="changePassword()">Zmień hasło</button>
          <p id="password-status"></p>
        </div>
      </main>
    </div>

    <script src="../script.js"></script>
    <script>
        // Sprawdź status logowania przy załadowaniu strony
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
            checkAdminStatus();
        });
    </script>
  </body>
</html>
